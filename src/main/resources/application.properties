# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=digital-banking-system

# ── Database (MySQL via Docker) ───────────────────────────────────────────────
# In Docker Compose the hostname is "db" (service name), not localhost
spring.datasource.url=jdbc:mysql://db:3306/bankingdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:bankinguser}
spring.datasource.password=${DB_PASSWORD:bankingpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP — Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# InnoDB is crucial for ACID compliance (MyISAM does not support transactions)
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# ── JWT ───────────────────────────────────────────────────────────────────────
# Use a strong 512-bit secret in production (load from env/vault, never hardcode)
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJWTSigningPurposesOnly123456!}
app.jwt.expiration-ms=86400000  # 24 hours

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.banking=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
